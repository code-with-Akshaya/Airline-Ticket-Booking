<!DOCTYPE html>
<html>
<head><title>Book Ticket</title></head>
<body>
    <h2>Book Your Ticket</h2>
    <form action="/book" method="post">
        Name: <input type="text" name="name" required><br>
        Age: <input type="number" name="age" required><br>
        Gender: <select name="gender">
            <option>Male</option><option>Female</option><option>Other</option>
        </select><br>
        Flight Name: <input type="text" name="flightName" required><br>
        From: <input type="text" name="from" required><br>
        To: <input type="text" name="to" required><br>
        Travel Date: <input type="text" name="travelDate" required><br>
        Passengers: <input type="number" name="numberOfPassengers" required><br>
        Seat Type: <select name="seatType">
            <option>Business</option><option>Economic</option><option>General</option>
        </select><br>
        <button type="submit">Confirm Booking</button>
    </form>
</body>
</html>
